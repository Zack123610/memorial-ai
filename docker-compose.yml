services:
  redis:
    image: redis:7-alpine
    container_name: memorial-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # The AI pipeline (tts-service, video-service) runs as native FastAPI
  # services rather than containers: tts-service needs local GPU / Apple
  # Silicon MPS access, and video-service calls cloud DashScope. See each
  # service's README for how to run them.

volumes:
  redis-data:
