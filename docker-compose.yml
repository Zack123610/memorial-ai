services:
  redis:
    image: redis:7-alpine
    container_name: memorial-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # ComfyUI is intentionally not containerized for local dev:
  # on macOS / Apple Silicon, GPU passthrough to Docker is unsupported,
  # so ComfyUI must run natively on the host. See comfyui/README.md.
  #
  # On a Linux + NVIDIA host, uncomment and adapt the block below:
  #
  # comfyui:
  #   image: ghcr.io/ai-dock/comfyui:latest
  #   container_name: memorial-comfyui
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]
  #   ports:
  #     - '8188:8188'
  #   volumes:
  #     - ./comfyui/workflows:/opt/ComfyUI/user/default/workflows
  #     - ./comfyui/custom_nodes:/opt/ComfyUI/custom_nodes
  #     - ./comfyui/models:/opt/ComfyUI/models
  #     - ./comfyui/output:/opt/ComfyUI/output

volumes:
  redis-data:
